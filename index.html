<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="main-card">
    <img class="blog-img" src="./assets/images/illustration-article.svg">
    <div class="content-card">
      <div class="category extrabold">Learning</div>
      <p class="publish-date medium">Published 21 Dec 2023</p>
      <h1 class="extrabold">HTML & CSS foundations</h1>
      <p class="description medium">These languages are the backbone of every website, defining structure, content, and presentation.</p>
    </div>
    <div class="author-card">
      <img class="user-pic" src="./assets/images/image-avatar.webp">
      <span class="author-name">Greg Hooper</span>
    </div>
  </div>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://www.frontendmentor.io/profile/Mell-o">Mellow</a>.
  </div>
</body>
</html>
