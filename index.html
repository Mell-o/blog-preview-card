<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <article class="main-card">
    <figure>
      <img class="blog-img" src="./assets/images/illustration-article.svg" alt="black and yellow article illustration">
    </figure>
    <div class="content-card">
      <div class="category extrabold">Learning</div>
      <time datetime="2023-12-21" class="publish-date medium">Published 21 Dec 2023</time>
      <h2 class="extrabold">HTML & CSS foundations</h2>
      <p class="description medium">These languages are the backbone of every website, defining structure, content, and presentation.</p>
    </div>
    <footer class="author-card">
      <img class="user-pic" src="./assets/images/image-avatar.webp">
      <span class="author-name">Greg Hooper</span>
    </footer>
  </article>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener noreferrer">Frontend Mentor</a>. 
    Coded by <a href="https://www.frontendmentor.io/profile/Mell-o">Mellow</a>.
  </footer>
</body>
</html>
